<!DOCTYPE html>
  <html>
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>返回 Electralog</title>
      <style>
          body { font-family: sans-serif; text-align: center; padding: 48px
  24px; }
          a { display: inline-block; margin-top: 12px; padding: 14px 32px;
              background: #E82127; color: #fff; text-decoration: none;
              border-radius: 8px; font-size: 16px; }
          code { word-break: break-all; font-size: 12px; color: #5C5E62; }
      </style>
  </head>
  <body>
      <p>登录成功</p>
      <p><code id="c"></code></p>
      <a id="btn" href="#">打开 Electralog</a>
      <script>
          var code = new URLSearchParams(window.location.search).get('code');
          document.getElementById('c').textContent = 'code: ' + (code ?
  code.substring(0,12)+'...' : '无');
          if (code) {
              var url = 'intent://callback?code=' + encodeURIComponent(code) +
                        '#Intent;scheme=electralog;package=com.electralog;end';
              document.getElementById('btn').href = url;
              window.location = url;
          }
      </script>
  </body>
  </html>
